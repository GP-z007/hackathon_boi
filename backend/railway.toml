[build]
builder = "dockerfile"

[deploy]
# Run pending migrations before serving traffic. Falls back to SQLAlchemy
# create_all on startup if alembic is unavailable.
startCommand = "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Required Railway environment variables (set these in the Railway dashboard;
# never commit real values):
#
#   SECRET_KEY      ← python -c "import secrets; print(secrets.token_hex(32))"
#   ENVIRONMENT     ← production
#   CORS_ORIGINS    ← https://your-app.vercel.app
#   DATABASE_URL    ← sqlite+aiosqlite:///./bias_audit.db  (or a managed Postgres URL)
#   MAX_UPLOAD_SIZE_MB ← 10
