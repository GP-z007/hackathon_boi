[build]
# Force the Docker builder. Without this, Railway falls back to nixpacks,
# auto-detects FastAPI, and complains "Script start.sh not found" because
# nixpacks expects a start.sh in the repo root. The Dockerfile already
# defines CMD, so we don't need a start script.
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Intentionally no startCommand here.
# Let Dockerfile CMD run as the single source of truth; this avoids
# platform-specific command parsing edge cases around $PORT expansion.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# ───── Required environment variables (set in the Railway dashboard) ─────
#
#   SECRET_KEY         python -c "import secrets; print(secrets.token_hex(32))"
#   ENVIRONMENT        production
#   CORS_ORIGINS       https://your-app.vercel.app   (no trailing slash)
#   DATABASE_URL       ${{Postgres.DATABASE_URL}}    (auto-resolves to
#                      postgresql://USER:PASS@HOST/DB; database.py
#                      auto-rewrites that to postgresql+asyncpg://...)
#   MAX_UPLOAD_SIZE_MB 10
#
# Optional:
#   DATASET_STORAGE_DIR   /data   (only meaningful if you attach a Volume)
